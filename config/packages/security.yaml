security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/admin,       roles: ROLE_ADMIN }
        - { path: ^/president,   roles: ROLE_PRESIDENT }
        - { path: ^/responsable, roles: ROLE_RESPONSABLE }
        - { path: ^/etudiant,    roles: ROLE_USER }