security:
    password_hashers:
        App\Entity\User:
            algorithm: auto
    role_hierarchy:
        ROLE_CHEF_CLUB: ROLE_USER
        ROLE_ADMIN: [ROLE_CHEF_CLUB, ROLE_USER]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/register,      roles: PUBLIC_ACCESS }
        - { path: ^/login,         roles: PUBLIC_ACCESS }
        - { path: ^/admin,         roles: ROLE_ADMIN }
        - { path: ^/president,     roles: ROLE_PRESIDENT }
        - { path: ^/responsable,   roles: ROLE_RESPONSABLE }
        - { path: ^/etudiant,      roles: ROLE_USER }
        - { path: ^/,              roles: ROLE_USER }